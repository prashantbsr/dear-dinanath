name: Deploy

# Builds the static site and publishes it to GitHub Pages.
#
# Base path note:
#   For a project page (served from https://<user>.github.io/<repo>/) the site
#   must be built with a base path equal to "/<repo>". The configure-pages step
#   detects this and exposes it as ${{ steps.pages.outputs.base_path }}, which we
#   pass through as NEXT_PUBLIC_BASE_PATH. For a user or organization page, or a
#   custom domain (served from the root), that value is empty and no prefix is
#   applied, so the same workflow works in both cases.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
